name: Publish Versioning Package to NuGet

on:
  push:
    branches:
      - main
    paths:
      - 'mitoSoft.WebApi.net10.Versioning/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore mitoSoft.WebApi.net10.Versioning/mitoSoft.WebApi.net10.Versioning.csproj
      
    - name: Build
      run: dotnet build mitoSoft.WebApi.net10.Versioning/mitoSoft.WebApi.net10.Versioning.csproj --configuration Release --no-restore
      
    - name: Pack
      run: dotnet pack mitoSoft.WebApi.net10.Versioning/mitoSoft.WebApi.net10.Versioning.csproj --configuration Release --no-build --output ./artifacts
      
    - name: Push to NuGet
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
